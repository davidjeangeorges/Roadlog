<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RoadLog — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy: #0E2A5C;
    --navy-light: #1B3A7A;
    --orange: #F5A623;
    --orange-dark: #D4891A;
    --white: #FFFFFF;
    --off-white: #F4F6FB;
    --gray: #8A94A6;
    --dark-text: #0A1E42;
    --border: #E2E8F4;
    --error: #E53E3E;
    --success: #38A169;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── BACKGROUND ── */
  .bg-pattern {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 70% 60% at 80% 20%, rgba(245,166,35,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 10% 80%, rgba(245,166,35,0.05) 0%, transparent 60%),
      repeating-linear-gradient(
        -55deg, transparent, transparent 40px,
        rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px
      );
  }
  .road-line {
    position: fixed; bottom: 0; left: 0; right: 0; height: 6px; z-index: 0;
    background: repeating-linear-gradient(90deg, var(--orange) 0, var(--orange) 60px, transparent 60px, transparent 100px);
    opacity: 0.3;
  }

  /* ── LAYOUT ── */
  .page {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
  }

  /* ── LOGO ── */
  .logo-wrap { margin-bottom: 36px; text-align: center; }
  .logo-wrap img { height: 72px; border-radius: 8px; }

  /* ── CARD ── */
  .card {
    background: var(--white);
    border-radius: 16px;
    padding: 44px 44px;
    width: 100%; max-width: 440px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.25);
  }

  .card-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px; font-weight: 900;
    text-transform: uppercase;
    color: var(--dark-text);
    margin-bottom: 4px;
  }
  .card-sub {
    font-size: 15px; color: var(--gray);
    margin-bottom: 32px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex; gap: 0;
    background: var(--off-white);
    border-radius: 10px; padding: 4px;
    margin-bottom: 32px;
  }
  .tab {
    flex: 1; text-align: center;
    padding: 10px;
    border-radius: 8px;
    font-size: 15px; font-weight: 600;
    cursor: pointer;
    color: var(--gray);
    transition: all 0.2s;
    border: none; background: none;
  }
  .tab.active {
    background: var(--white);
    color: var(--dark-text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  /* ── FORM ── */
  .form-group { margin-bottom: 20px; }
  label {
    display: block;
    font-size: 13px; font-weight: 600;
    color: var(--dark-text);
    margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  input {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 15px; font-family: 'Barlow', sans-serif;
    color: var(--dark-text);
    background: var(--white);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  input:focus {
    border-color: var(--navy);
    box-shadow: 0 0 0 3px rgba(14,42,92,0.08);
  }
  input.error { border-color: var(--error); }

  .input-hint {
    font-size: 12px; color: var(--gray);
    margin-top: 5px;
  }

  /* ── BUTTON ── */
  .btn-submit {
    width: 100%;
    background: var(--orange);
    color: var(--navy);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1px;
    padding: 15px;
    border: none; border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    box-shadow: 0 4px 16px rgba(245,166,35,0.35);
  }
  .btn-submit:hover {
    background: var(--orange-dark);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(245,166,35,0.45);
  }
  .btn-submit:disabled {
    opacity: 0.6; cursor: not-allowed; transform: none;
  }

  /* ── DIVIDER ── */
  .divider {
    text-align: center; margin: 24px 0;
    position: relative;
  }
  .divider::before {
    content: ''; position: absolute;
    top: 50%; left: 0; right: 0; height: 1px;
    background: var(--border);
  }
  .divider span {
    position: relative; background: var(--white);
    padding: 0 12px; font-size: 13px; color: var(--gray);
  }

  /* ── ALERT ── */
  .alert {
    padding: 12px 16px; border-radius: 8px;
    font-size: 14px; margin-bottom: 20px;
    display: none;
  }
  .alert.error { background: #FFF5F5; color: var(--error); border: 1px solid #FED7D7; display: block; }
  .alert.success { background: #F0FFF4; color: var(--success); border: 1px solid #C6F6D5; display: block; }

  /* ── TERMS ── */
  .terms {
    font-size: 12px; color: var(--gray);
    text-align: center; margin-top: 20px; line-height: 1.5;
  }
  .terms a { color: var(--navy); text-decoration: none; }
  .terms a:hover { text-decoration: underline; }

  /* ── TRIAL BADGE ── */
  .trial-badge {
    text-align: center; margin-bottom: 24px;
  }
  .trial-badge span {
    display: inline-block;
    background: rgba(245,166,35,0.12);
    border: 1px solid rgba(245,166,35,0.4);
    color: var(--orange);
    font-size: 13px; font-weight: 700;
    padding: 6px 16px; border-radius: 100px;
    letter-spacing: 0.5px;
  }

  /* ── BACK LINK ── */
  .back-link {
    text-align: center; margin-top: 24px;
  }
  .back-link a {
    color: rgba(255,255,255,0.5);
    font-size: 14px; text-decoration: none;
    transition: color 0.2s;
  }
  .back-link a:hover { color: var(--orange); }

  /* ── FORGOT PASSWORD ── */
  .forgot {
    text-align: right; margin-top: -12px; margin-bottom: 20px;
  }
  .forgot a {
    font-size: 13px; color: var(--gray);
    text-decoration: none; transition: color 0.2s;
  }
  .forgot a:hover { color: var(--navy); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .logo-wrap { animation: fadeUp 0.4s ease both; }
  .card { animation: fadeUp 0.4s 0.1s ease both; }

  @media (max-width: 480px) {
    .card { padding: 32px 24px; }
  }
</style>
</head>

  <div class="card">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
      <button class="tab" id="tab-login" onclick="switchTab('login')">Sign In</button>
    </div>

    <!-- Alert -->
    <div class="alert" id="alert"></div>

    <!-- SIGN UP FORM -->
    <div id="form-signup">
      <div class="trial-badge"><span>🚛 14-Day Free Trial — No Credit Card Needed</span></div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signup-name" placeholder="John Smith"/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="signup-email" placeholder="john@email.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="At least 8 characters"/>
        <div class="input-hint">Minimum 8 characters</div>
      </div>
      <button class="btn-submit" id="btn-signup" onclick="handleSignup()">Start Free Trial →</button>
      <div class="terms">
        By signing up you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
      </div>
    </div>

    <!-- LOGIN FORM -->
    <div id="form-login" style="display:none">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="john@email.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Your password"/>
      </div>
      <div class="forgot"><a href="#" onclick="handleForgotPassword()">Forgot password?</a></div>
      <button class="btn-submit" id="btn-login" onclick="handleLogin()">Sign In →</button>
    </div>
  </div>

  <div class="back-link"><a href="index.html">← Back to homepage</a></div>
</div>

<script>
  // ── SUPABASE CONFIG ── swap these with your real values
  const SUPABASE_URL = 'https://owolhmuhliwvqedewliq.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93b2xobXVobGl3dnFlZGV3bGlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NzIxMTgsImV4cCI6MjA4OTU0ODExOH0.f8tXjmt6bxolucAAJGYs1ShEvPO2JcG0rNpDJ0vYZwU'
  const { createClient } = supabase
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  // ── CAPTURE REFERRAL CODE FROM URL ──
  const urlParams = new URLSearchParams(window.location.search)
  const refCode = urlParams.get('ref') || ''
  if (refCode) sessionStorage.setItem('ref_code', refCode)

  // ── CHECK IF ALREADY LOGGED IN ──
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'dashboard.html'
  })

  // ── TAB SWITCH ──
  function switchTab(tab) {
    clearAlert()
    document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none'
    document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none'
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup')
    document.getElementById('tab-login').classList.toggle('active', tab === 'login')
  }

  // ── SHOW ALERT ──
  function showAlert(msg, type) {
    const el = document.getElementById('alert')
    el.textContent = msg
    el.className = 'alert ' + type
  }
  function clearAlert() {
    const el = document.getElementById('alert')
    el.className = 'alert'
    el.textContent = ''
  }

  // ── SIGN UP ──
  async function handleSignup() {
    const name = document.getElementById('signup-name').value.trim()
    const email = document.getElementById('signup-email').value.trim()
    const password = document.getElementById('signup-password').value

    if (!name) return showAlert('Please enter your full name.', 'error')
    if (!email) return showAlert('Please enter your email address.', 'error')
    if (password.length < 8) return showAlert('Password must be at least 8 characters.', 'error')

    const btn = document.getElementById('btn-signup')
    btn.disabled = true
    btn.textContent = 'Creating your account...'

    const { data, error } = await sb.auth.signUp({
      email,
      password,
      options: { data: { full_name: name } }
    })

    if (error) {
      showAlert(error.message, 'error')
      btn.disabled = false
      btn.textContent = 'Start Free Trial →'
      return
    }

    // Save referral code to profile after signup
    const savedRef = sessionStorage.getItem('ref_code')
    if (savedRef && data.user) {
      await sb.from('referral_codes_pending').insert({
        user_id: data.user.id,
        ref_code: savedRef
      })
    }

    showAlert('Account created! Check your email to confirm, then come back to sign in.', 'success')
    btn.textContent = 'Check Your Email ✓'
  }

  // ── LOGIN ──
  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim()
    const password = document.getElementById('login-password').value

    if (!email || !password) return showAlert('Please enter your email and password.', 'error')

    const btn = document.getElementById('btn-login')
    btn.disabled = true
    btn.textContent = 'Signing in...'

    const { data, error } = await sb.auth.signInWithPassword({ email, password })

    if (error) {
      showAlert('Wrong email or password. Please try again.', 'error')
      btn.disabled = false
      btn.textContent = 'Sign In →'
      return
    }

    // Check if profile exists — if not, go to onboarding
    const { data: profile } = await sb.from('profiles').select('id').eq('id', data.user.id).single()
    if (!profile) {
      window.location.href = 'onboarding.html'
    } else {
      window.location.href = 'dashboard.html'
    }
  }

  // ── FORGOT PASSWORD ──
  async function handleForgotPassword() {
    const email = document.getElementById('login-email').value.trim()
    if (!email) return showAlert('Enter your email above first, then click Forgot Password.', 'error')

    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/auth.html'
    })

    if (error) return showAlert(error.message, 'error')
    showAlert('Password reset email sent! Check your inbox.', 'success')
  }

  // ── ENTER KEY SUPPORT ──
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const activeForm = document.getElementById('form-login').style.display === 'none' ? 'signup' : 'login'
      if (activeForm === 'signup') handleSignup()
      else handleLogin()
    }
  })
</script>
